<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 — garbage collected ☕</title>
        <meta name="theme-color" content="#0c0a09" />
        <link rel="icon" type="image/svg+xml" href="/assets/duke.svg" />
        <style>
            :root {
                --bg: #0c0a09;
                --ink: #f4ece2;
                --muted: #a89a88;
                --coffee: #c8804a;
                --coffee-2: #e0a86b;
                --crema: #f0c894;
                --line: rgba(200, 128, 74, 0.35);
                --serif:
                    "Iowan Old Style", "Palatino Linotype", Palatino, Georgia,
                    serif;
                --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: var(--bg);
                color: var(--ink);
                font-family: var(--serif);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                min-height: 100vh;
                display: grid;
                place-items: center;
                text-align: center;
                padding: 24px;
            }
            .code {
                font-family: var(--serif);
                font-weight: 600;
                line-height: 1;
                font-size: clamp(96px, 26vw, 220px);
                background: linear-gradient(180deg, var(--crema), var(--coffee));
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            h1 {
                font-size: clamp(22px, 5vw, 34px);
                font-weight: 600;
                margin: 8px 0 14px;
            }
            p {
                color: var(--muted);
                font-family: var(--mono);
                font-size: 13px;
                letter-spacing: 0.5px;
                max-width: 30ch;
                margin: 0 auto 30px;
            }
            code {
                font-family: var(--mono);
                background: rgba(200, 128, 74, 0.12);
                color: var(--crema);
                padding: 1px 7px;
                border-radius: 5px;
                font-size: 0.9em;
            }
            .home {
                font-family: var(--mono);
                font-size: 13px;
                letter-spacing: 1px;
                color: #1c1410;
                background: var(--crema);
                border-radius: 999px;
                padding: 11px 22px;
                text-decoration: none;
                transition: background 0.2s ease;
            }
            .home:hover {
                background: var(--coffee-2);
            }
        </style>
    </head>
    <body>
        <main>
            <div class="code">404</div>
            <h1>This page got garbage collected.</h1>
            <p>
                No live references remain — the
                <code>GC</code> swept it up. Let's get you back to a rooted
                object.
            </p>
            <a class="home" href="/">← back to the story</a>
        </main>
    </body>
</html>
